version: '3.8'

services:
  # 1. Frontend Service
  frontend:
    build: ./frontend
    container_name: frontend-service
    ports:
      - "80:80"  # Máy bạn vào cổng 80, Docker đẩy vào 80 của Nginx (đã sửa trong nginx.conf)
    depends_on:
      - product-service
      - order-service
      - payment-service
    networks:
      - serein-network

  # 2. Product Service 
  product-service:
    build: ./product-service-ecommerce
    container_name: product-service
    ports:
      - "8001:8001" 
    environment:
      - MONGO_URI=mongodb+srv://bmbtrung_db_user:ZYcO5VqRTkob3v1c@soa.fvwonfx.mongodb.net/product_db?appName=SOA
    networks:
      - serein-network

  # 3. Order Service
  order-service:
    build: ./Order-Service-API
    container_name: order-service
    ports:
      - "8002:8002"
    environment:
      - MONGO_URI=mongodb+srv://bmbtrung_db_user:ZYcO5VqRTkob3v1c@soa.fvwonfx.mongodb.net/order_db?appName=SOA
    depends_on:
      - product-service
      - payment-service
    networks:
      - serein-network

  # 4. Payment Service
  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8003:8003" # Đồng bộ cổng 8003 cả trong lẫn ngoài
    environment:
      - MONGO_URI=mongodb+srv://bmbtrung_db_user:ZYcO5VqRTkob3v1c@soa.fvwonfx.mongodb.net/payment_db?appName=SOA
      - PORT=8003   # Đưa về 8003 cho khớp với server.js
    networks:
      - serein-network

networks:
  serein-network:
    driver: bridge